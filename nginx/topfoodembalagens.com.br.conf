# nginx — SÓ o TopFood (topfoodembalagens.com.br → porta 3000)
# Instalar na VPS:
#   sudo cp nginx/topfoodembalagens.com.br.conf /etc/nginx/sites-available/topfoodembalagens.com.br
#   sudo ln -sf /etc/nginx/sites-available/topfoodembalagens.com.br /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx     # reload NÃO derruba os outros sites
# HTTPS (uma vez): sudo certbot --nginx -d topfoodembalagens.com.br -d www.topfoodembalagens.com.br

server {
    listen 80;
    server_name topfoodembalagens.com.br www.topfoodembalagens.com.br;

    client_max_body_size 25m;

    # Compressão (o app também comprime; aqui cobre o que o nginx serve direto)
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Esconde a versão do nginx nas respostas
    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
