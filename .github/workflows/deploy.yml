name: Deploy para a VPS Hostinger

# Toda vez que algo entra na branch main, o GitHub entra na VPS por SSH,
# puxa o código novo, instala dependências e reinicia o site. Sobe sozinho.
on:
  push:
    branches: [ main ]
  workflow_dispatch:        # permite disparar manualmente pelo botão "Run workflow"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Conectar na VPS e atualizar o site
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}          # IP ou domínio da VPS
          username: ${{ secrets.VPS_USER }}        # usuário SSH (ex: root)
          key: ${{ secrets.VPS_SSH_KEY }}          # chave SSH privada
          port: ${{ secrets.VPS_PORT || 22 }}      # porta SSH (22 por padrão)
          script: |
            set -e
            # Caminho do projeto na VPS (secret VPS_PATH; senão usa o padrão real)
            cd "${{ secrets.VPS_PATH }}" 2>/dev/null || cd /var/www/topfood
            echo ">> Pasta: $(pwd)"
            git fetch origin main
            git reset --hard origin/main          # iguala ao GitHub; data/ é gitignored, fica preservado
            # Instala dependências só se o package-lock mudou (deploy rápido quando não muda)
            if ! git diff --quiet HEAD@{1} HEAD -- package-lock.json 2>/dev/null; then
              echo ">> package-lock mudou — rodando npm install"
              npm install --legacy-peer-deps --no-audit --no-fund
            else
              echo ">> sem mudança de dependências — pulando npm install"
            fi
            # Reinicia SÓ o app topfood (não encosta no verbovivo)
            pm2 restart topfood && pm2 save
            echo ">> Deploy concluido em $(date)"
