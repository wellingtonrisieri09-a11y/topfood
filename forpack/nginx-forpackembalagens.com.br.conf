# nginx — SÓ o Forpack (forpackembalagens.com.br → porta 3002)
# Instalar na VPS:
#   sudo cp /var/www/topfood/forpack/nginx-forpackembalagens.com.br.conf /etc/nginx/sites-available/forpackembalagens.com.br
#   sudo ln -sf /etc/nginx/sites-available/forpackembalagens.com.br /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx     # reload NÃO derruba os outros sites
# HTTPS (uma vez): sudo certbot --nginx -d forpackembalagens.com.br -d www.forpackembalagens.com.br

server {
    listen 80;
    server_name forpackembalagens.com.br www.forpackembalagens.com.br;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
